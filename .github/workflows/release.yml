name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon) ────────────────────────────────────
  macos-arm64:
    runs-on: macos-15
    strategy:
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Build extension
        run: |
          phpize
          ./configure --enable-metal
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make test TESTS=tests/ NO_INTERACTION=1 REPORT_EXIT_STATUS=1 || true

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASENAME="php_metal-${VERSION}_php${{ matrix.php }}-arm64-darwin-bsdlibc"
          strip -x modules/metal.so
          cp modules/metal.so "${BASENAME}.so"
          zip "${BASENAME}.zip" "${BASENAME}.so"

      - uses: actions/upload-artifact@v4
        with:
          name: metal-macos-arm64-php${{ matrix.php }}
          path: php_metal-*_php${{ matrix.php }}-arm64-darwin-bsdlibc.zip

  # ── macOS x86_64 (Intel) ──────────────────────────────────────────
  macos-x86_64:
    runs-on: macos-15
    strategy:
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Build extension
        run: |
          phpize
          ./configure --enable-metal
          make -j$(sysctl -n hw.ncpu)

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASENAME="php_metal-${VERSION}_php${{ matrix.php }}-x86_64-darwin-bsdlibc"
          strip -x modules/metal.so
          cp modules/metal.so "${BASENAME}.so"
          zip "${BASENAME}.zip" "${BASENAME}.so"

      - uses: actions/upload-artifact@v4
        with:
          name: metal-macos-x86_64-php${{ matrix.php }}
          path: php_metal-*_php${{ matrix.php }}-x86_64-darwin-bsdlibc.zip

  # ── Release ────────────────────────────────────────────────────────
  release:
    needs: [macos-arm64, macos-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
